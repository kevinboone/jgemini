# This is a sample configuration file for JGemini
# Lines beginning '#' are comments
# The sample settings in this file are the same as the
#   defaults, and don't need to be changed unless
#   you want to.

#
# User interface font settings. All sizes are in pixels.
#

# Menu and control fonts
#ui.control_font=Liberation Sans 20
#ui.user_font=Liberation Sans 20

# Document font base size; heading sizes, etc., are 
#  calculated by scaling this.
#ui.document.font.size=16

#
# URL History settings
#

# Set history.enabled=1 to allow JGemini to save URL history
#history.enabled=0

# Number of lines of history to save
#history.size=30

# Set history.file if you want to save history to a custom file
#history.file=/path/to/.jgemini.history

#
# Theme settings
#

# Theme can be 'light', 'dark', or 'custom'
#ui.document.theme=light

# If theme is "custom", specify the path to a CSS file
#ui.document.custom.css=/path/to/file.css

#
# Layout settings
#

# Initial window size
#window.w=1200
#window.h=900

#
# Inline image settings
#

# Set 1 or 0 to enable or disable the display of images
#   automatically withing a Gemtext document
#gemtext.inline.images=1

# Size of all inline images
#inline.image.width=400

#
# URL bar settings
#

# Set to 1 or 0 to enable or disable searching directly
#   from the URL bar
#urlbar.search.enabled=1

# URL bar search provider
#urlbar.search.url=gemini://tlgs.one/search

#
# Debugging settings
#

# Logging level, 0-3 
#log.level=0

